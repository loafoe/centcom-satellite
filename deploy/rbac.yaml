---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pico-agent
  namespace: pico-agent
  labels:
    app.kubernetes.io/name: pico-agent
    app.kubernetes.io/component: service-account
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pico-agent
  labels:
    app.kubernetes.io/name: pico-agent
    app.kubernetes.io/component: rbac
rules:
  # PVC operations for resize
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # PV read access for status checking
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # StorageClass read access to check allowVolumeExpansion
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # Node read access for cluster_info task
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Namespace read access for cluster_info task
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Pod read access for cluster_health, resource_pressure tasks
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Event read access for cluster_health task
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Workload read access for cluster_health task
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Service read access for list_services task
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # Ingress read access for list_ingresses task
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  # Gateway API read access (optional, graceful degradation if CRDs missing)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - gatewayclasses
      - httproutes
      - tlsroutes
      - grpcroutes
      - tcproutes
      - udproutes
    verbs: ["get", "list", "watch"]
  # EndpointSlices for list_endpoints task
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # NetworkPolicies for list_network_policies task
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pico-agent
  labels:
    app.kubernetes.io/name: pico-agent
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pico-agent
subjects:
  - kind: ServiceAccount
    name: pico-agent
    namespace: pico-agent
