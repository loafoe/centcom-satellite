---
apiVersion: v1
kind: Service
metadata:
  name: centcom-satellite
  namespace: centcom-satellite
  labels:
    app.kubernetes.io/name: centcom-satellite
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: centcom-satellite
